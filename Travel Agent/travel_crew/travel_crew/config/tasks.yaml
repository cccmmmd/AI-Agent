# config/tasks.yaml
# ──────────────────────────────────────────────────────────────
# 「專業導遊行前智庫」Task 任務定義
# context 欄位由 main.py 的 @task 裝飾器以程式方式串接，
# 此處僅定義 description 與 expected_output。
# ──────────────────────────────────────────────────────────────

logistics_task:
  agent: logistics_officer
  description: >
    針對旅遊目的地「{destination}」，調查以下資訊：

    1. 天氣與氣候：{date} 期間的平均氣溫、降雨機率與穿著建議。
    2. 電力規格：當地插座類型（Type 幾）與電壓（V/Hz），
       台灣旅客是否需要轉接頭或變壓器。
    3. 飲水安全：自來水是否可直接飲用，還是建議購買瓶裝水。
    4. 行動網路：主要電信商覆蓋品質，是否建議購買當地 SIM 卡。

    請勿涉及任何交通運輸、航班或路線規劃。
    客戶類型：{customer_type}
  expected_output: >
    一份條列式的生活民情清單，
    包含天氣、電力、飲水、網路四個區塊，每項提供具體數字或規格。

financial_task:
  agent: financial_advisor
  description: >
    針對旅遊目的地「{destination}」，調查以下金融資訊：

    1. 即時匯率：台幣（TWD）兌當地貨幣的近期匯率參考值。
    2. 換匯建議：機場換匯 vs 當地銀行 vs ATM，哪種最划算？
    3. 刷卡普及度：信用卡接受程度（Visa／MasterCard），
       是否有地方只收現金？建議帶多少現金備用？
    4. 退稅資訊：退稅最低消費門檻、退稅率，以及機場退稅流程。
    5. 注意事項：是否有動態貨幣換算（DCC）陷阱需要提醒？

    請勿涉及任何交通費用或路線規劃。
    客戶類型：{customer_type}
  expected_output: >
    一份金融財務建議報告，
    包含具體匯率數字、現金建議金額與退稅操作步驟。

safety_task:
  agent: safety_culture_expert
  description: >
    針對旅遊目的地「{destination}」，調查以下安全與文化資訊：

    1. 旅遊詐騙：列出目前最常見的 3 種針對觀光客的詐騙手法，
       並說明如何識別與應對。
    2. 文化禁忌：列出台灣旅客最容易忽略的 3 項當地禁忌
       （行為、服裝、拍照等）。
    3. 宗教與禮儀：進入宗教場所的穿著規範，以及基本問候禮儀。
    4. 緊急聯絡資訊：當地警察、救護車、台灣駐外辦事處電話號碼。
    5. 必學短語：3 至 5 句當地語言的實用短語（附羅馬拼音）。

    請勿涉及任何交通運輸或路線規劃。
    客戶類型：{customer_type}
  expected_output: >
    一份文化安全提醒清單，
    包含詐騙防護盾、禮儀貼士與緊急聯絡資訊。

final_report_task:
  agent: lead_editor  
  description: >
    你是資深導遊文案主編。請將「國際專業導遊專家」、「國際金融專家」、
    「文化與安全專家」的調查報告，整合成一份發送給貴賓的行前通知。

    目的地：{destination}
    出發日期：{date}
    客戶類型：{customer_type}

    格式要求（Markdown）：
    1. 開頭以溫暖的導遊口吻寫一段「行前歡迎辭」（3-4 句）。
    2. 使用以下章節結構（依序）：
       - 天氣與行李準備
       - 電力與網路設備
       - 飲食與飲水安全
       - 金融與消費指南
       - 安全防護盾（詐騙防範）
       - 文化禮儀與禁忌
       - 緊急聯絡一覽
       - 行李準備 Checklist（checkbox 格式）
       - 導遊的小叮嚀（2-3 條個人建議，語氣溫暖親切）
    3. 語氣：資深管家風格，專業但不冷冰冰。
    4. 每個章節使用粗體小標、條列或表格，確保手機也易讀。
    5. 嚴格排除任何交通運輸、航班資訊或路線規劃內容。
  expected_output: >
    一份完整的 Markdown 格式行前通知報告，
    包含所有指定章節，語氣溫暖專業，適合直接發送給高級客戶。
